<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avanti Fellows FY27 Org</title>
<script src="data.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1a2a3a;font-size:13px}
header{background:linear-gradient(135deg,#1a3a5c,#0e6655);color:#fff;padding:12px 24px;display:flex;align-items:center;gap:12px}
header h1{font-size:1.1rem;font-weight:700}
header span{font-size:.78rem;opacity:.7;margin-left:auto}
.tabs{display:flex;background:#fff;border-bottom:2px solid #d0dce8;padding:0 20px;position:sticky;top:0;z-index:20;gap:2px}
.tab{padding:9px 20px;cursor:pointer;font-weight:600;font-size:.82rem;color:#5a7a9a;border-bottom:3px solid transparent;transition:.15s;user-select:none;white-space:nowrap}
.tab.active{color:#1a3a5c;border-bottom-color:#0e6655}
.tab:hover:not(.active){color:#1a3a5c;background:#f8fbff}
.panel{display:none;padding:14px 20px;height:calc(100vh - 88px);overflow-y:auto}
.panel.active{display:block}
.toolbar{display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;position:sticky;top:0;background:#f0f4f8;padding:6px 0 6px;z-index:5}
.toolbar input{padding:6px 11px;border:1px solid #c8d8e8;border-radius:6px;font-size:.82rem;width:240px;outline:none;background:#fff}
.toolbar input:focus{border-color:#0e6655;box-shadow:0 0 0 2px rgba(14,102,85,.1)}
.toolbar button{padding:5px 11px;border:1px solid #c8d8e8;border-radius:6px;background:#fff;cursor:pointer;font-size:.77rem;color:#1a3a5c;transition:.12s}
.toolbar button:hover{background:#e6f4f0;border-color:#0e6655}
.stats{font-size:.73rem;color:#7a9ab0;margin-left:auto}

/* Tree */
.tree-root{max-width:1200px}
.node-wrap{margin:2px 0}
.children{padding-left:20px;border-left:1px solid #d8e8f0;margin-left:10px;margin-top:2px}
.node-row{display:inline-flex;align-items:flex-start;gap:4px;cursor:pointer;margin:2px 0}
.tog{min-width:13px;font-size:.7rem;color:#8aaa9a;padding-top:4px;transition:.15s}
.tog.open{}
.tog.closed{transform:rotate(-90deg)}
.tog.leaf{color:transparent}
.card{background:#fff;border:1px solid #d8e4f0;border-radius:7px;padding:5px 10px;display:inline-block;transition:.12s}
.card:hover{border-color:#0e6655;box-shadow:0 2px 5px rgba(14,102,85,.1)}
.card.root-card{background:linear-gradient(135deg,#1a3a5c,#0e6655)!important;color:#fff!important;border:none!important}
.card.tbh-card{background:#fffbf0!important;border-color:#e8c84a!important}
.card.vendor-card{background:#f5f0ff!important;border-color:#c8a8e8!important}
.card.hi{background:#fff9e0!important;border-color:#e8c000!important;box-shadow:0 0 0 2px #e8c00044!important}
.card.dim{opacity:.2!important}
.nrow{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.nname{font-weight:600;font-size:.82rem}
.root-card .nname{color:#fff}
.nid{font-size:.68rem;color:#9ab0c0;font-family:monospace}
.root-card .nid{color:#a0d0c0}
.ndesig{font-size:.7rem;color:#5a80a0;margin-top:1px}
.root-card .ndesig{color:#b0d8cc}
.badge{font-size:.6rem;padding:1px 5px;border-radius:3px;font-weight:700;white-space:nowrap}
.b-notice{background:#fff0c0;color:#7a5000}
.b-tbh{background:#fffbe0;color:#8a6000;border:1px solid #e8d060}
.b-vendor{background:#ede0ff;color:#5a2080}
.b-exit{background:#ffe0e0;color:#9a0000}
.b-leave{background:#e0f0ff;color:#004080}
.b-new{background:#e0ffe8;color:#005020}

/* Centre blocks (teaching) */
.centres-wrap{padding-left:20px;border-left:1px solid #d8e8f0;margin-left:10px;margin-top:4px;display:flex;flex-wrap:wrap;gap:6px;padding-top:4px;padding-bottom:4px}
.ctr-card{background:#fff;border:1px solid #c8d8ec;border-radius:7px;min-width:180px;max-width:260px;overflow:hidden;cursor:pointer;transition:.12s}
.ctr-card:hover{border-color:#0e6655;box-shadow:0 2px 5px rgba(14,102,85,.1)}
.ctr-hdr{background:#eaf2fb;padding:5px 10px;display:flex;align-items:center;gap:5px}
.ctr-name{font-size:.77rem;font-weight:700;color:#1a3a5c;flex:1}
.ctr-count{font-size:.65rem;color:#6a9ab0;background:#d0e8f8;padding:1px 5px;border-radius:3px}
.ctr-body{padding:6px 8px;display:flex;flex-wrap:wrap;gap:3px}
.t-chip{background:#f4f8fc;border:1px solid #d0dce8;border-radius:4px;padding:2px 6px;font-size:.69rem;display:inline-flex;align-items:center;gap:3px}
.t-chip.tbh-chip{background:#fffbf0;border-color:#e8c84a}
.t-subj{font-weight:700;color:#0e6655;font-size:.63rem}
.t-name{font-weight:600}
.t-id{font-size:.6rem;color:#9ab0c0;font-family:monospace}
.lvl-badge{font-size:.58rem;padding:1px 3px;border-radius:2px;background:#e0f0e8;color:#0a5a3a}

/* No-RM section */
.orphan-section{margin-top:16px;background:#fff8f0;border:1px solid #e8d8c0;border-radius:8px;overflow:hidden}
.orphan-hdr{padding:8px 14px;background:#f5ece0;cursor:pointer;display:flex;align-items:center;gap:8px;font-weight:700;font-size:.82rem;color:#7a4a00}
.orphan-body{padding:10px 14px;display:flex;flex-wrap:wrap;gap:6px}
.o-chip{background:#fff;border:1px solid #e8d8c0;border-radius:5px;padding:3px 8px;font-size:.75rem}

/* Flat list (untagged / exits / vacancies) */
.flat-table{width:100%;border-collapse:collapse;font-size:.8rem;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.flat-table th{background:#1a3a5c;color:#fff;padding:8px 12px;text-align:left;font-size:.76rem;font-weight:600;white-space:nowrap}
.flat-table td{padding:7px 12px;border-bottom:1px solid #e8f0f8;vertical-align:top}
.flat-table tr:last-child td{border-bottom:none}
.flat-table tr:hover td{background:#f4f8fc}
.flat-table tr.exit-row td{background:#fff8f8}
.flat-table tr.leave-row td{background:#f8f0ff}
.flat-table tr.notice-row td{background:#fffff0}
.section-hdr{font-size:.75rem;font-weight:700;color:#7a9ab0;text-transform:uppercase;letter-spacing:.5px;padding:10px 0 4px;border-top:1px solid #d8e8f0;margin-top:6px}
.section-hdr:first-child{border-top:none;padding-top:2px}
</style>
</head>
<body>
<header>
  <h1>Avanti Fellows — FY27 Org Structure</h1>
  <span id="hdr-counts">Loading...</span>
</header>
<div class="tabs">
  <div class="tab active" onclick="showTab('org',this)">Org</div>
  <div class="tab" onclick="showTab('centres',this)" id="tab-centres">Centres</div>
</div>
<div id="org" class="panel active">
  <div class="toolbar">
    <input type="text" id="org-search" placeholder="Search name, ID, centre, role…" oninput="doSearch(this.value)">
    <button onclick="setAll(true)">Expand All</button>
    <button onclick="setAll(false)">Collapse All</button>
    <span class="stats" id="org-stats"></span>
  </div>
  <div id="org-tree" class="tree-root"></div>
  <div id="other-status" style="margin-top:24px"></div>
</div>
<div id="centres" class="panel">
  <div class="toolbar" style="flex-wrap:wrap;gap:8px">
    <input type="text" id="ctr-search" placeholder="Search centre, name, AF ID, subject…" oninput="buildCentres()" style="width:230px">
    <select id="ctr-subj" onchange="buildCentres()" style="padding:6px 10px;border:1px solid #cde;border-radius:6px;font-size:.82rem;background:#fff">
      <option value="">All Subjects</option>
      <option>Physics</option><option>Chemistry</option><option>Maths</option><option>Biology</option><option>APC</option>
    </select>
    <select id="ctr-status" onchange="buildCentres()" style="padding:6px 10px;border:1px solid #cde;border-radius:6px;font-size:.82rem;background:#fff">
      <option value="">All Statuses</option>
      <option value="Active">Active</option>
      <option value="Unassigned">Unassigned</option>
      <option value="TBH">TBH (Vacant)</option>
      <option value="Vendor">Vendor</option>
    </select>
    <span class="stats" id="ctr-stats"></span>
  </div>
  <div id="centres-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding-top:4px"></div>
  <div id="ctr-no-results" style="display:none;text-align:center;color:#aaa;padding:40px;font-size:14px">No centres match your search.</div>
</div>

<script>
let RAW = []; // loaded from data.js

/* ── categorise (status-only, using cols A–K) ───────── */
function isActive(p){ return p.status==='Active' || p.status==='Active - Role Change'; }
function isTeacher(p){ return p.type==='Teaching Staff' || p.type==='Vendor'; }
function isTBH(p){ return (p.id||'').startsWith('TBH'); }

// status → label/colour for the bottom sections
const STATUS_DEF = [
  {key:'TBH',                 label:'TBH (Vacancies)',  bg:'#fff3e0', fg:'#e65100'},
  {key:'Exit',                label:'Exits',            bg:'#ffebee', fg:'#c62828'},
  {key:'Long Leave',          label:'Long Leave',       bg:'#e3f2fd', fg:'#1565c0'},
  {key:'Maternity',           label:'Maternity',        bg:'#f3e5f5', fg:'#6a1b9a'},
  {key:'Under Notice period', label:'Under Notice',     bg:'#fff8e1', fg:'#7a5000'},
  {key:'Unassigned',          label:'Unassigned',       bg:'#eceff1', fg:'#37474f'},
  {key:'Vendor',              label:'Vendors',          bg:'#ede0ff', fg:'#5a2080'}
];

let active=[], byId={}, children={}, nonActiveByStatus={};

function recompute(){
  active = RAW.filter(isActive);
  byId={};
  active.forEach(p=>{ if(p.id) byId[p.id]=p; });
  children={};
  active.forEach(p=>{
    const rid=p.rm_id;
    if(rid && rid!=='BOARD' && rid!=='AF BOARD' && rid!=='UNMAPPED' && rid!=='EXIT' && rid!=='' && byId[rid]){
      (children[rid]=children[rid]||[]).push(p);
    }
  });
  nonActiveByStatus={};
  RAW.forEach(p=>{
    if(isActive(p)) return;
    (nonActiveByStatus[p.status]=nonActiveByStatus[p.status]||[]).push(p);
  });
}

/* ── helpers ────────────────────────────────────────── */
const SUBJ_SHORT={'Physics':'P','Chemistry':'C','Mathematics':'M','Biology':'B',
                  'Maths':'M','Math':'M','English':'En','Social Science':'SS',
                  'Science':'Sc','Hindi':'Hi','Telugu':'Te','Kannada':'Ka',
                  'Tamil':'Ta','Marathi':'Ma','Gujarati':'Gu','Bengali':'Be',
                  'Odia':'Od','Punjabi':'Pu','Urdu':'Ur','Computer Science':'CS',
                  'Commerce':'Co','Economics':'Ec','Accountancy':'Ac'};
function shortSubj(s){
  if(!s) return '';
  const parts=s.split(',').map(x=>x.trim());
  return parts.map(p=>SUBJ_SHORT[p]||p.slice(0,2)).join('/');
}
const LVL_COLOR={'JEE Advanced':'#1a6040','JEE Mains Plus':'#1a5090','JEE Main':'#2060a0',
                 'JM+':'#1a5090','JM':'#2060a0','Adv':'#1a6040',
                 'NEET':'#8a3000','Foundation':'#5a0a7a','Fnd':'#5a0a7a',
                 'CET':'#7a4000','MBBS':'#600040'};
function lvlStyle(l){
  if(!l)return '';
  const parts=l.split(',').map(x=>x.trim());
  const col=LVL_COLOR[parts[0]]||'#3a5a7a';
  return `background:${col}22;color:${col};`;
}

/* ── render person card ─────────────────────────────── */
function personCard(p,extra=''){
  const tbh=p.status==='TBH';
  const vend=p.type==='Vendor';
  const notice=p.status==='Under Notice period';
  let cls='card';
  if(tbh)cls+=' tbh-card';
  if(vend)cls+=' vendor-card';
  let badges='';
  if(notice) badges+=`<span class="badge b-notice">Notice</span>`;
  if(tbh&&!vend) badges+=`<span class="badge b-tbh">TBH</span>`;
  if(vend) badges+=`<span class="badge b-vendor">Vendor</span>`;
  const desig=p.desig?`<div class="ndesig">${p.desig}</div>`:'';
  const id=p.id?`<span class="nid">${p.id}</span>`:'';
  return `<div class="${cls}" data-id="${p.id||''}" data-name="${p.name.toLowerCase()}" data-ctr="${p.ctr.toLowerCase()}" data-desig="${p.desig.toLowerCase()}">
    <div class="nrow"><span class="nname">${p.name}</span>${id}${badges}</div>${desig}${extra}
  </div>`;
}

/* ── render a centre + teachers ─────────────────────── */
function ctrBlock(ctrName,teachers){
  const cnt=teachers.length;
  const chips=teachers.map(t=>{
    const tbh=isTBH(t);
    const sj=shortSubj(t.subj);
    const lv=t.lvls.split(',')[0].trim();
    const lc=lvlStyle(lv);
    const nm=tbh?'<em style="color:#8a6000">Vacancy</em>':t.name;
    const id=t.id?`<span class="t-id">${t.id}</span>`:'';
    const lvb=lv?`<span class="lvl-badge" style="${lc}">${lv}</span>`:'';
    return `<span class="t-chip${tbh?' tbh-chip':''}"><span class="t-subj">${sj}</span><span class="t-name">${nm}</span>${id}${lvb}</span>`;
  }).join('');
  const searchStr=[ctrName,...teachers.map(t=>(t.name+' '+(t.id||'')+' '+(t.subj||'')+' '+(t.desig||'')))].join(' ').toLowerCase();
  return `<div class="ctr-card" data-search="${searchStr.replace(/"/g,'')}" onclick="this.querySelector('.ctr-body').style.display=this.querySelector('.ctr-body').style.display==='none'?'flex':'none'">
    <div class="ctr-hdr"><span class="ctr-name">📍 ${ctrName}</span><span class="ctr-count">${cnt}</span></div>
    <div class="ctr-body">${chips}</div>
  </div>`;
}

/* ── recursive tree node ────────────────────────────── */
function renderNode(p,depth){
  const kids=children[p.id]||[];
  const ntKids=kids.filter(k=>!isTeacher(k));
  const tchKids=kids.filter(k=>isTeacher(k));

  // Group teaching children by centre
  const byCentre={};
  tchKids.forEach(t=>{
    const ctrs=t.ctr?t.ctr.split(',').map(s=>s.trim()):['(No Centre)'];
    const cname=ctrs[0]||'(No Centre)';
    if(!byCentre[cname])byCentre[cname]=[];
    byCentre[cname].push(t);
  });
  const ctrNames=Object.keys(byCentre).sort();

  const hasChildren=ntKids.length>0||ctrNames.length>0;
  const isRoot=depth===0;

  let cls='card'+(isRoot?' root-card':'');
  const tbh=p.status==='TBH';
  const vend=p.type==='Vendor';
  if(tbh&&!isRoot) cls='card tbh-card';
  if(vend) cls='card vendor-card';
  const notice=p.status==='Under Notice period';
  let badges='';
  if(notice) badges+=`<span class="badge b-notice">Notice</span>`;
  if(tbh) badges+=`<span class="badge b-tbh">TBH</span>`;
  if(vend) badges+=`<span class="badge b-vendor">Vendor</span>`;
  const desig=p.desig?`<div class="ndesig">${p.desig}</div>`:'';
  const id=p.id?`<span class="nid">${p.id}</span>`:'';

  let togIcon=hasChildren?'▾':'';
  let html=`<div class="node-wrap" data-id="${p.id||''}">
    <div class="node-row" onclick="toggleNode(this)">
      <span class="tog${hasChildren?'':' leaf'}">${togIcon}</span>
      <div class="${cls}" data-id="${p.id||''}" data-name="${p.name.toLowerCase()}" data-ctr="${p.ctr.toLowerCase()}" data-desig="${p.desig.toLowerCase()}">
        <div class="nrow"><span class="nname">${p.name}</span>${id}${badges}</div>${desig}
      </div>
    </div>`;

  if(hasChildren){
    html+=`<div class="children">`;
    ntKids.forEach(k=>html+=renderNode(k,depth+1));
    if(ctrNames.length>0){
      html+=`<div class="centres-wrap">`;
      ctrNames.forEach(cn=>html+=ctrBlock(cn,byCentre[cn]));
      html+=`</div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  return html;
}

/* ── build org tree + bottom sections ───────────────── */
function buildOrg(){
  // Board-level roots (rm_id = BOARD/AF BOARD) → render as full trees at top
  const boardRoots = active.filter(p => (p.rm_id==='BOARD'||p.rm_id==='AF BOARD') && !isTeacher(p));
  const isResolved = p => p.rm_id && p.rm_id!=='UNMAPPED' && p.rm_id!=='EXIT' && byId[p.rm_id];

  // Active without a resolved RM → "Untagged" orphan sections
  const orphanNT      = active.filter(p => !isTeacher(p) && p.rm_id!=='BOARD' && p.rm_id!=='AF BOARD' && !isResolved(p));
  const orphanTeacher = active.filter(p =>  isTeacher(p) && !isResolved(p));

  let h='';
  boardRoots.forEach(r => { h += renderNode(r,0); });

  // ── Untagged sections (active but unrouted)
  if(orphanNT.length){
    h += orphanSection('⚑ Untagged — Staff with no resolved manager', orphanNT, p => `
      <div class="o-chip">
        <b>${p.name}</b> <span style="font-size:.63rem;color:#9ab0c0">${p.id}</span>
        ${p.desig?`<span style="font-size:.68rem;color:#7a9ab0"> · ${p.desig}</span>`:''}
        ${p.rm_nm?`<span style="font-size:.62rem;color:#aaa"> → ${p.rm_nm} (${p.rm_id||'?'})</span>`:''}
      </div>`,
      '#fff8f0', '#e8d8c0');
  }
  if(orphanTeacher.length){
    h += orphanSection('⚑ Untagged — Teachers with no resolved manager', orphanTeacher, t => {
      const sj = shortSubj(t.subj);
      return `<div class="o-chip"><b>${sj||'—'}</b> ${t.name||'(TBH)'} <span style="font-size:.63rem;color:#9ab0c0">${t.id}</span>${t.ctr?' — '+t.ctr:''}</div>`;
    }, '#fff8f0', '#e8d8c0');
  }

  document.getElementById('org-tree').innerHTML = h;
  document.getElementById('org-stats').textContent = `${active.length} active · ${orphanNT.length+orphanTeacher.length} untagged`;

  // ── Other-status sections (everyone non-Active)
  let other='';
  STATUS_DEF.forEach(({key,label,bg,fg})=>{
    const list = nonActiveByStatus[key]||[];
    if(!list.length) return;
    other += otherStatusSection(label, list, bg, fg);
  });
  // Catch any unexpected status not in STATUS_DEF
  Object.keys(nonActiveByStatus).forEach(k=>{
    if(STATUS_DEF.some(s=>s.key===k)) return;
    other += otherStatusSection(`Other — ${k}`, nonActiveByStatus[k], '#f5f5f5', '#555');
  });
  document.getElementById('other-status').innerHTML = other;
}

function orphanSection(title, list, rowFn, bg='#fff8f0', border='#e8d8c0'){
  let inner = list.map(rowFn).join('');
  return `<div class="orphan-section" style="margin-top:14px;background:${bg};border-color:${border}">
    <div class="orphan-hdr" onclick="const b=this.nextElementSibling;b.style.display=b.style.display==='none'?'flex':'none'">
      ${title} (${list.length})
      <span style="font-size:.72rem;font-weight:400;margin-left:8px;opacity:.7">click to expand</span>
    </div>
    <div class="orphan-body" style="display:none">${inner}</div>
  </div>`;
}

function otherStatusSection(label, list, bg, fg){
  const rows = list.map(p=>{
    const sj = isTeacher(p)?shortSubj(p.subj):'';
    const idTag = p.id?`<span style="font-size:.63rem;color:#9ab0c0;font-family:monospace">${p.id}</span>`:'';
    const ctr = p.ctr?`<span style="font-size:.65rem;color:#7a9ab0"> — ${p.ctr}</span>`:'';
    const desig = p.desig?`<span style="font-size:.66rem;color:#7a9ab0"> · ${p.desig}</span>`:'';
    const subjTag = sj?`<span style="font-size:.6rem;font-weight:700;color:#0e6655;margin-right:4px">${sj}</span>`:'';
    return `<div class="o-chip">${subjTag}<b>${p.name||'(TBH)'}</b> ${idTag}${desig}${ctr}</div>`;
  }).join('');
  return `<div class="orphan-section" style="margin-top:10px;background:${bg};border-color:${fg}33">
    <div class="orphan-hdr" style="background:${bg};color:${fg}" onclick="const b=this.nextElementSibling;b.style.display=b.style.display==='none'?'flex':'none'">
      ${label} (${list.length})
      <span style="font-size:.72rem;font-weight:400;margin-left:8px;opacity:.7">click to expand</span>
    </div>
    <div class="orphan-body" style="display:none">${rows}</div>
  </div>`;
}

/* ── toggle ─────────────────────────────────────────── */
function toggleNode(row){
  const ch=row.parentElement.querySelector(':scope > .children, :scope > .centres-wrap');
  // find the children div that is a sibling of this row's parent
  const wrap=row.parentElement;
  const childDiv=wrap.querySelector(':scope>.children');
  const tog=row.querySelector('.tog');
  if(!childDiv)return;
  const isOpen=childDiv.style.display!=='none';
  childDiv.style.display=isOpen?'none':'';
  if(tog){tog.style.transform=isOpen?'rotate(-90deg)':''}
}
function setAll(open){
  document.querySelectorAll('#org-tree .children').forEach(el=>{el.style.display=open?'':'none';});
  document.querySelectorAll('#org-tree .tog:not(.leaf)').forEach(el=>{el.style.transform=open?'':'rotate(-90deg)';});
}

/* ── search ─────────────────────────────────────────── */
function doSearch(q){
  q=q.toLowerCase().trim();
  const cards=document.querySelectorAll('#org-tree .card[data-name]');
  const ctrCards=document.querySelectorAll('#org-tree .ctr-card[data-search]');
  if(!q){
    cards.forEach(c=>{c.classList.remove('hi','dim');});
    ctrCards.forEach(c=>{c.style.display='';});
    document.querySelectorAll('#org-tree .centres-wrap').forEach(w=>{w.style.display='';});
    return;
  }
  let found=0;
  // Handle person cards (NT staff nodes)
  cards.forEach(c=>{
    const hit=c.dataset.name.includes(q)||c.dataset.id.includes(q)||
               c.dataset.ctr.includes(q)||c.dataset.desig.includes(q);
    c.classList.toggle('hi',hit);
    c.classList.toggle('dim',!hit);
    if(hit)found++;
  });
  // Handle centre cards (teacher groupings)
  ctrCards.forEach(c=>{
    const hit=c.dataset.search.includes(q);
    c.style.display=hit?'':'none';
    if(hit)found++;
  });
  // Hide centres-wrap entirely if all its ctr-cards are hidden
  document.querySelectorAll('#org-tree .centres-wrap').forEach(w=>{
    const visible=[...w.querySelectorAll('.ctr-card')].some(c=>c.style.display!=='none');
    w.style.display=visible?'':'none';
  });
  // Expand ancestors of hits (person cards)
  document.querySelectorAll('#org-tree .card.hi').forEach(c=>{
    let el=c.closest('.node-wrap');
    while(el){
      const ch=el.querySelector(':scope>.children');
      if(ch)ch.style.display='';
      el=el.parentElement?.closest('.node-wrap');
    }
  });
  // Expand ancestors of visible centre cards
  document.querySelectorAll('#org-tree .ctr-card[data-search]').forEach(c=>{
    if(c.style.display==='none')return;
    let el=c.closest('.node-wrap');
    while(el){
      const ch=el.querySelector(':scope>.children');
      if(ch)ch.style.display='';
      el=el.parentElement?.closest('.node-wrap');
    }
  });
  document.getElementById('org-stats').textContent=`${found} matches`;
}

/* ── centres tab ────────────────────────────────────── */
function buildCentres(){
  const TEACHING = new Set(['Teaching Staff','Vendor']);
  const SKIP_STATUS = new Set(['Exit','Long Leave','Maternity']);
  const SKIP_CTR = new Set(['','nan','NA','Bench']);

  // group RAW by centre
  const q = (document.getElementById('ctr-search').value||'').toLowerCase();
  const subjF = document.getElementById('ctr-subj').value;
  const stF   = document.getElementById('ctr-status').value;

  const centreMap = {};
  for(const p of RAW){
    if(!TEACHING.has(p.type)) continue;
    if(SKIP_STATUS.has(p.status)) continue;
    const ctr = (p.ctr||'').trim();
    if(!ctr || SKIP_CTR.has(ctr) || ctr.includes('Bench')) continue;
    (centreMap[ctr] = centreMap[ctr]||[]).push(p);
  }

  const sortedCtrs = Object.keys(centreMap).sort();
  const subjC = {'Physics':'#e3f2fd:#1565c0','Chemistry':'#f3e5f5:#6a1b9a','Maths':'#e8f5e9:#2e7d32','Biology':'#fff8e1:#f57f17','APC':'#fce4ec:#c62828'};
  const dotC  = {'Active':'#43a047','Unassigned':'#fb8c00','TBH':'#e53935','Vendor':'#26a69a'};

  let html = '';
  let visCtr = 0, visTeach = 0;

  for(const ctr of sortedCtrs){
    const teachers = centreMap[ctr];
    const filtered = teachers.filter(t=>{
      if(subjF && !((t.subj||'').includes(subjF))) return false;
      if(stF){
        const st = t.status==='TBH'?'TBH':(t.type==='Vendor'?'Vendor':t.status);
        if(st!==stF) return false;
      }
      if(q){
        const hay = (ctr+' '+(t.id||'')+' '+(t.name||'')+' '+(t.subj||'')).toLowerCase();
        if(!hay.includes(q)) return false;
      }
      return true;
    });
    if(!filtered.length) continue;

    visCtr++; visTeach+=filtered.length;
    const tbhN = filtered.filter(t=>t.status==='TBH').length;

    html += `<div style="background:#fff;border-radius:10px;border:1px solid #e0e4f5;overflow:hidden">
      <div style="padding:9px 14px;background:#f0f3ff;border-bottom:1px solid #e0e4f5;display:flex;align-items:center;gap:8px">
        <span style="font-weight:700;font-size:.82rem;color:#2d3a8c;flex:1">${ctr}</span>
        <span style="font-size:.7rem;font-weight:600;padding:2px 7px;border-radius:10px;background:#e8eaf6;color:#3949ab">${filtered.length} staff</span>
        ${tbhN?`<span style="font-size:.7rem;font-weight:600;padding:2px 7px;border-radius:10px;background:#fff3e0;color:#e65100">${tbhN} TBH</span>`:''}
      </div>`;

    for(const t of filtered){
      const subj = (t.subj||'').split(',')[0].trim();
      const colors = subjC[subj]||'#eceff1:#455a64';
      const [bg,fg] = colors.split(':');
      const dot = dotC[t.status==='TBH'?'TBH':(t.type==='Vendor'?'Vendor':t.status)] || '#bdbdbd';
      const idColor = t.type==='Vendor'?'#2e7d32':(t.status==='TBH'||!t.id?'#e65100':'#5c6bc0');
      const displayId = t.id||'—';
      html += `<div style="display:flex;align-items:center;gap:8px;padding:5px 14px;border-bottom:1px solid #f3f4f8">
        <span style="width:7px;height:7px;border-radius:50%;background:${dot};flex-shrink:0"></span>
        <span style="font-size:.72rem;font-weight:600;color:${idColor};min-width:54px;font-family:monospace">${displayId}</span>
        <span style="flex:1;font-size:.78rem;color:#333">${t.name||'TBH'}</span>
        ${subj?`<span style="font-size:.68rem;font-weight:600;padding:2px 6px;border-radius:5px;background:${bg};color:${fg};white-space:nowrap">${subj}</span>`:''}
      </div>`;
    }
    html += '</div>';
  }

  document.getElementById('centres-grid').innerHTML = html;
  document.getElementById('ctr-stats').textContent = `${visCtr} centres · ${visTeach} teachers`;
  document.getElementById('ctr-no-results').style.display = visCtr===0?'block':'none';
}

/* ── tab switch ─────────────────────────────────────── */
function showTab(id,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(el)el.classList.add('active');
}

RAW = window.__ORG_DATA__ || [];
recompute();
buildOrg();
buildCentres();

document.getElementById('hdr-counts').textContent =
  `${active.length} active · ${nonActiveCount} other (TBH/Exit/Leave/Unassigned/etc.) · ${RAW.length} total`;
