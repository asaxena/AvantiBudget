<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Avanti Fellows FY27 Org Structure</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#1a2a3a;font-size:13px}
header{background:linear-gradient(135deg,#1a3a5c,#0e6655);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:12px}
header h1{font-size:1.2rem;font-weight:700}
header span{font-size:.8rem;opacity:.7;margin-left:auto}
.tabs{display:flex;background:#fff;border-bottom:2px solid #d0dce8;padding:0 20px;position:sticky;top:0;z-index:10}
.tab{padding:10px 22px;cursor:pointer;font-weight:600;font-size:.85rem;color:#5a7a9a;border-bottom:3px solid transparent;transition:.15s;user-select:none}
.tab.active{color:#1a3a5c;border-bottom-color:#0e6655}
.tab:hover:not(.active){color:#1a3a5c}
.panel{display:none;padding:16px 20px;height:calc(100vh - 90px);overflow-y:auto}
.panel.active{display:block}
.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap;position:sticky;top:0;background:#f0f4f8;padding:6px 0;z-index:5}
.toolbar input{padding:6px 11px;border:1px solid #c8d8e8;border-radius:6px;font-size:.82rem;width:220px;outline:none}
.toolbar input:focus{border-color:#0e6655}
.toolbar button{padding:5px 12px;border:1px solid #c8d8e8;border-radius:6px;background:#fff;cursor:pointer;font-size:.78rem;color:#1a3a5c;transition:.12s}
.toolbar button:hover{background:#e6f4f0;border-color:#0e6655}
.stats{font-size:.75rem;color:#7a9ab0;margin-left:auto}
.section-title{font-size:.75rem;font-weight:700;color:#7a9ab0;text-transform:uppercase;letter-spacing:.6px;margin:12px 0 6px}

/* NT Tree */
.two-col{display:flex;gap:20px;flex-wrap:wrap}
.two-col>div{flex:1;min-width:320px}
ul.tree,ul.children{list-style:none;padding-left:0}
ul.children{padding-left:18px;border-left:1px solid #d0dce8;margin-left:8px}
li{position:relative}
.node{display:inline-flex;align-items:flex-start;gap:5px;cursor:pointer;user-select:none;margin:2px 0}
.toggle{min-width:14px;font-size:.75rem;color:#8aaa9a;padding-top:3px}
.node-card{background:#fff;border:1px solid #d8e4f0;border-radius:7px;padding:5px 10px;transition:.12s;display:inline-block}
.node-card:hover{border-color:#0e6655;box-shadow:0 2px 5px rgba(14,102,85,.1)}
.root-card{background:linear-gradient(135deg,#1a3a5c,#0e6655)!important;color:#fff!important;border:none!important}
.tbh-card{background:#fffbf0!important;border-color:#e8c84a!important}
.hi{background:#fff9e0!important;border-color:#e8c000!important;box-shadow:0 0 0 2px #e8c00044!important}
.dim{opacity:.25!important}
.nrow{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.nname{font-weight:600;font-size:.82rem}
.root-card .nname{color:#fff}
.nid{font-size:.7rem;color:#9ab0c0;font-family:monospace}
.root-card .nid{color:#a0d0c0}
.ndesig{font-size:.72rem;color:#6080a0;margin-top:1px}
.root-card .ndesig{color:#b0d8cc}
.badge{font-size:.62rem;padding:1px 5px;border-radius:3px;font-weight:700}
.b-tbh{background:#fff0c0;color:#8a6000}
.b-not{background:#ffe0e0;color:#9a0000}
.b-exit{background:#f0d8d8;color:#7a0000}
.b-orph{background:#f5ead0;color:#7a4400}

.legend{display:flex;align-items:center;gap:12px;font-size:.72rem;color:#5a7a9a;flex-wrap:wrap;margin-left:auto}
.legend-item{display:flex;align-items:center;gap:4px}
.unmapped-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.um-card{background:#fff5f5;border:1px solid #e8c0c0;border-radius:6px;padding:4px 9px;font-size:.75rem}
.um-card.tbh-um{background:#fffbf0;border-color:#e8d08a}

/* Teaching Tree - full hierarchy */
.t-root{background:#fff;border:1px solid #d0dce8;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.mgmt-hdr{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none}
.mgmt-hdr.lv0{background:linear-gradient(135deg,#1a3a5c,#0e6655);color:#fff}
.mgmt-hdr.lv1{background:#1a4a6c;color:#fff}
.mgmt-hdr.lv2{background:#eaf2fb;color:#1a3a5c;border-top:1px solid #c8d8ec}
.mgmt-hdr h3{font-size:.9rem;font-weight:700;flex:1}
.mgmt-hdr .tag{font-size:.68rem;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,.18);white-space:nowrap}
.mgmt-hdr.lv2 .tag{background:#d0e8f8;color:#1a5a8a}
.mgmt-body{padding:0}
.spm-block{margin:8px 12px;background:#f4f8fc;border:1px solid #c4d8ec;border-radius:8px;overflow:hidden}
.spm-hdr{padding:7px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;background:#e2eff8;user-select:none}
.spm-hdr h4{font-size:.83rem;font-weight:700;color:#1a3a5c;flex:1}
.spm-body{padding:8px 12px}
.pm-block{margin-bottom:8px;background:#fff;border:1px solid #d4e4f4;border-radius:7px;overflow:hidden}
.pm-hdr{padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;background:#f0f6fc;user-select:none}
.pm-hdr h5{font-size:.8rem;font-weight:600;color:#1a3a5c;flex:1}
.pm-body{padding:6px 10px 8px}
.apm-row{margin-bottom:8px}
.apm-pill{display:inline-flex;align-items:center;gap:5px;background:#e4f4ed;border:1px solid #90c4a8;border-radius:5px;padding:3px 8px;font-size:.72rem;font-weight:700;color:#0a5a3a;margin-bottom:5px}
.centres-grid{display:flex;flex-wrap:wrap;gap:6px}
.ctr-card{background:#fff;border:1px solid #d0dce8;border-radius:7px;overflow:hidden;min-width:190px;max-width:260px;cursor:pointer;transition:.12s}
.ctr-card:hover{border-color:#0e6655;box-shadow:0 2px 5px rgba(14,102,85,.1)}
.ctr-hdr{padding:5px 10px;background:#f8fafc;display:flex;align-items:center;gap:5px}
.ctr-name{font-size:.78rem;font-weight:700;color:#1a2a3a;flex:1}
.ctr-body{padding:5px 10px 7px;display:none}
.teachers-grid{display:flex;flex-wrap:wrap;gap:4px}
.t-node{background:#f4f8fc;border:1px solid #d0dce8;border-radius:5px;padding:3px 7px;font-size:.7rem;cursor:default}
.t-node.tbh-t{background:#fffbf0;border-color:#e8c84a}
.t-subj{font-weight:700;font-size:.63rem;color:#0e6655;min-width:14px;display:inline-block}
.t-name{font-weight:600}
.t-id{font-size:.62rem;color:#9ab0c0;font-family:monospace}
.t-lvl{font-size:.6rem;padding:1px 4px;border-radius:3px;margin-top:2px;display:inline-block}
.chevron{font-size:.72rem;opacity:.5;transition:.15s}
.mgmt-hdr.collapsed .chevron,.spm-hdr.collapsed .chevron,.pm-hdr.collapsed .chevron{transform:rotate(-90deg)}

/* Teaching tree - NT card style */
.ctr-teach-card{background:#f0f8ff!important;border-color:#b0d0e8!important}
.teach-teachers{margin:3px 0 3px 22px;padding:5px 8px;background:#f8fbff;border:1px solid #d8eaf8;border-radius:5px;display:flex;flex-wrap:wrap;gap:3px}
.tbh-section{margin-top:16px;background:#fff;border:1px solid #e8d890;border-radius:10px;overflow:hidden}
.tbh-section-hdr{background:#fffbe0;padding:9px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;user-select:none}
</style>
</head>

function switchTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['nt','teaching'][i]===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
}

/* ══ NT TREE ══ */
function badge(s){
  if(!s||s==='Active') return '';
  if(s.includes('TBH')) return '<span class="badge b-tbh">TBH</span>';
  if(s.includes('Notice')) return '<span class="badge b-not">NP</span>';
  return '';
}
function buildNTNode(n,isRoot){
  const isTBH=n.id.startsWith('TBH');
  const cls=isRoot?'root-card':(isTBH?'tbh-card':'');
  const hasKids=n.children&&n.children.length;
  const tog=hasKids?'<span class="toggle">▼</span>':'<span class="toggle" style="opacity:0">·</span>';
  const ds=(n.name+' '+n.desig+' '+n.id+' '+n.fn).toLowerCase();
  let li=`<li><span class="node" onclick="toggleNT(this)">
    ${tog}<div class="node-card ${cls}" data-s="${ds}">
      <div class="nrow"><span class="nname">${n.name}</span><span class="nid">${n.id}</span>${badge(n.status)}</div>
      <div class="ndesig">${n.desig||''}${n.fn?' · <em>'+n.fn+'</em>':''}</div>
    </div></span>`;
  if(hasKids){ li+='<ul class="children">'; n.children.forEach(c=>{li+=buildNTNode(c,false);}); li+='</ul>'; }
  return li+'</li>';
}
function renderNT(){
  const w=document.getElementById('nt-wrap');
  const umCard=(p,bclass='',blabel='')=>`<div class="um-card ${p.id.startsWith('TBH')?'tbh-um':''}" data-s="${(p.name+p.desig+p.id).toLowerCase()}">
    <b>${p.name}</b> <span style="font-family:monospace;font-size:.65rem;opacity:.6">${p.id}</span>
    ${bclass?`<span class="badge ${bclass}" style="margin-left:4px">${blabel}</span>`:''}
    <div style="font-size:.65rem;color:#7a9ab0">${p.desig||''}</div>
    ${p.orphan_reason?`<div style="font-size:.62rem;color:#c07030;margin-top:2px">⚠ ${p.orphan_reason}</div>`:''}</div>`;
  const umHtml=(D.nt_exits&&D.nt_exits.length?`<div class="section-title" style="margin-top:0">Exits (${D.nt_exits.length})</div><div class="unmapped-wrap">${D.nt_exits.map(p=>umCard(p,'b-exit','Exit')).join('')}</div>`:'')
    +(D.nt_orphaned&&D.nt_orphaned.length?`<div class="section-title">Orphaned — manager exited (${D.nt_orphaned.length})</div><div class="unmapped-wrap">${D.nt_orphaned.map(p=>umCard(p,'b-orph','Orph')).join('')}</div>`:'')
    +`<div class="section-title">No RM / Unresolved (${D.nt_no_rm.length})</div><div class="unmapped-wrap">${D.nt_no_rm.map(p=>umCard(p)).join('')}</div>`;
  w.innerHTML=`<div class="two-col">
    <div><div class="section-title">Co-CEO · Akshay Saxena</div><ul class="tree" id="ta">${buildNTNode(D.nt_akshay,true)}</ul></div>
    <div><div class="section-title">Co-CEO · Vandana Goyal</div><ul class="tree" id="tv">${buildNTNode(D.nt_vandana,true)}</ul></div>
  </div>
  <div class="section-title" style="margin-top:16px">⚠ Unassigned (${(D.nt_exits||[]).length+(D.nt_orphaned||[]).length+(D.nt_no_rm||[]).length})</div>
  <div class="unmapped-wrap">${umHtml}</div>`;
  function cnt(n){return 1+(n.children||[]).reduce((a,c)=>a+cnt(c),0);}
  const totalUnassigned=(D.nt_exits||[]).length+(D.nt_orphaned||[]).length+(D.nt_no_rm||[]).length;
  document.getElementById('nt-stats').textContent=`${cnt(D.nt_akshay)+cnt(D.nt_vandana)} in tree · ${totalUnassigned} unassigned`;
  ['ta','tv'].forEach(id=>{
    const root=document.getElementById(id);
    root&&root.querySelectorAll('ul.children ul.children ul.children').forEach(u=>{
      u.style.display='none';
      const t=u.previousElementSibling&&u.previousElementSibling.querySelector('.toggle');
      if(t)t.textContent='▶';
    });
  });
}
function toggleNT(el){
  const ul=el.parentElement.querySelector('ul.children');
  if(!ul)return;
  const open=ul.style.display!=='none';
  ul.style.display=open?'none':'';
  const t=el.querySelector('.toggle');
  if(t)t.textContent=open?'▶':'▼';
}
function expandAll(){document.querySelectorAll('#nt-wrap ul.children').forEach(u=>u.style.display='');document.querySelectorAll('#nt-wrap .toggle').forEach(t=>t.textContent='▼');}
function collapseAll(){document.querySelectorAll('#nt-wrap ul.children').forEach(u=>u.style.display='none');document.querySelectorAll('#nt-wrap .toggle').forEach(t=>t.textContent='▶');}
function filterNT(q){
  q=q.toLowerCase().trim();
  document.querySelectorAll('#nt-wrap .node-card').forEach(c=>{c.classList.toggle('hi',!!q&&c.dataset.s.includes(q));c.classList.toggle('dim',!!q&&!c.dataset.s.includes(q));});
  document.querySelectorAll('#nt-wrap .um-card').forEach(c=>{c.style.opacity=(!q||c.dataset.s.includes(q))?'1':'0.2';});
  if(q)expandAll();
}

/* ══ TEACHING TREE (NT card style) ══ */
const LC={'JEE Mains Plus':'#0057b7','NEET':'#e63946','JEE Main':'#8338ec','JEE Advanced':'#06d6a0','MBBS':'#e8a000','CET':'#fb8500','Foundation':'#e76f51','Unknown':'#aaa'};

// Convert teaching_mgmt nested structure → flat NT-compatible tree
function convMgmt(node){
  const kids=[];
  if(node.spm_data) kids.push(...convSPMData(node.spm_data));
  (node.children||[]).forEach(ch=>kids.push(convMgmt(ch)));
  return {id:node.id,name:node.name,desig:node.desig||'',status:node.status||'Active',fn:'',children:kids};
}
function convSPMData(spmData){
  const nodes=[];
  for(const pm of (spmData.pms||[])){
    const pmKids=[];
    for(const apm of (pm.apms||[])){
      const centreKids=(apm.centres||[]).map(c=>({
        id:'ctr_'+c.name.replace(/\W+/g,'_'),name:c.name,
        desig:[c.prog,c.state,c.cat].filter(Boolean).join(' · '),
        status:'centre',fn:'',_centre:c,children:[]
      }));
      const unassignedAPM=(!apm.id&&apm.name==='Unassigned');
      if(unassignedAPM){ pmKids.push(...centreKids); }
      else{ pmKids.push({id:apm.id||'',name:apm.name,desig:'Associate Program Manager',
        status:(apm.id||'').startsWith('TBH')?'TBH':'Active',fn:'APM',children:centreKids}); }
    }
    const unassignedPM=(!pm.id&&pm.name==='Unassigned');
    if(unassignedPM){ nodes.push(...pmKids); }
    else{ nodes.push({id:pm.id||'',name:pm.name,desig:'Program Manager',
      status:(pm.id||'').startsWith('TBH')?'TBH':'Active',fn:'PM',children:pmKids}); }
  }
  return nodes;
}

function buildTeachNode(n,isRoot){
  const isTBH=n.id&&n.id.startsWith('TBH');
  const isCentre=n.status==='centre';
  const ds=(n.name+' '+(n.desig||'')+' '+(n.id||'')).toLowerCase();

  if(isCentre&&n._centre){
    const c=n._centre;
    const cbid='ctrT_'+n.id;
    const tHtml=(c.teachers||[]).map(t=>{
      const col=LC[t.level]||'#9ab0c0';
      const tbh=!t.id||t.id.startsWith('TBH');
      return `<div class="t-node ${tbh?'tbh-t':''}" title="${t.name} (${t.id||'TBH'}) · ${t.level}">
        <span class="t-subj">${t.subj}</span> <span class="t-name">${t.name.split(' ')[0]}</span>
        <span class="t-id">${t.id||'TBH'}</span>
        <div><span class="t-lvl" style="background:${col}18;color:${col};border:1px solid ${col}40">${t.level||'—'}</span></div>
      </div>`;
    }).join('');
    return `<li><span class="node" onclick="toggleCtrT('${cbid}',this)">
      <span class="toggle">▶</span><div class="node-card ctr-teach-card" data-s="${ds}">
        <div class="nrow"><span class="nname">${c.name}</span>
          <span style="font-size:.62rem;background:#e0f0ff;color:#1a5a8a;padding:1px 5px;border-radius:3px;font-weight:700">${c.cat||''}</span>
          <span style="font-size:.65rem;color:#9ab0c0;margin-left:3px">${c.prog||''}</span>
        </div>
        <div class="ndesig">${c.state||''}</div>
      </div></span>
      <div id="${cbid}" style="display:none;margin-left:22px;padding:4px 0">
        <div class="teach-teachers">${tHtml||'<span style="color:#aaa;font-size:.7rem">No teachers mapped</span>'}</div>
      </div>
    </li>`;
  }

  const cls=isRoot?'root-card':(isTBH?'tbh-card':'');
  const hasKids=n.children&&n.children.length;
  const tog=hasKids?'<span class="toggle">▼</span>':'<span class="toggle" style="opacity:0">·</span>';
  let li=`<li><span class="node" onclick="toggleNT(this)">
    ${tog}<div class="node-card ${cls}" data-s="${ds}">
      <div class="nrow"><span class="nname">${n.name}</span><span class="nid">${n.id||''}</span>${badge(n.status)}</div>
      <div class="ndesig">${n.desig||''}${n.fn&&n.fn!==n.desig?' · <em>'+n.fn+'</em>':''}</div>
    </div></span>`;
  if(hasKids){
    li+='<ul class="children">';
    n.children.forEach(ch=>{li+=buildTeachNode(ch,false);});
    li+='</ul>';
  }
  return li+'</li>';
}

function cntCentres(n){
  if(n.status==='centre') return 1;
  return (n.children||[]).reduce((a,c)=>a+cntCentres(c),0);
}

function renderTeaching(){
  const w=document.getElementById('t-wrap');
  const teachTree=convMgmt(D.teaching_mgmt);
  const totalC=cntCentres(teachTree);

  // Unassigned teachers from nt_no_rm
  const unassT=(D.nt_no_rm||[]).filter(p=>
    (p.fn||'').toLowerCase().includes('teach')||
    (p.desig||'').toLowerCase().includes('teacher')||
    (p.desig||'').toLowerCase().includes('master teacher')
  );
  const umHtml=unassT.length?
    `<div class="section-title" style="margin-top:16px">⚠ Unassigned Teachers (${unassT.length})</div>
    <div class="unmapped-wrap">${unassT.map(p=>`<div class="um-card" data-s="${(p.name+p.desig+p.id).toLowerCase()}">
      <b>${p.name}</b> <span style="font-family:monospace;font-size:.65rem;opacity:.6">${p.id}</span>
      <div style="font-size:.65rem;color:#7a9ab0">${p.desig||''}</div>
    </div>`).join('')}</div>` : '';

  w.innerHTML=`<ul class="tree" id="tt">${buildTeachNode(teachTree,true)}</ul>${umHtml}`;
  document.getElementById('t-stats').textContent=`${totalC} centres · ${unassT.length} unassigned teacher${unassT.length!==1?'s':''}`;

  // Collapse from APM level down by default
  const root=document.getElementById('tt');
  if(root){
    root.querySelectorAll('ul.children ul.children ul.children ul.children').forEach(u=>{
      u.style.display='none';
      const t=u.previousElementSibling&&u.previousElementSibling.querySelector('.toggle');
      if(t)t.textContent='▶';
    });
  }
}

function toggleCtrT(id,el){
  const body=document.getElementById(id);
  if(!body)return;
  const open=body.style.display!=='none';
  body.style.display=open?'none':'';
  const t=el.querySelector('.toggle');
  if(t)t.textContent=open?'▶':'▼';
}
function expandAllT(){
  document.querySelectorAll('#t-wrap ul.children').forEach(u=>u.style.display='');
  document.querySelectorAll('#t-wrap .toggle').forEach(t=>t.textContent='▼');
  document.querySelectorAll('#t-wrap [id^="ctrT_"]').forEach(e=>e.style.display='');
}
function collapseAllT(){
  document.querySelectorAll('#t-wrap ul.children').forEach(u=>u.style.display='none');
  document.querySelectorAll('#t-wrap .toggle').forEach(t=>t.textContent='▶');
  document.querySelectorAll('#t-wrap [id^="ctrT_"]').forEach(e=>e.style.display='none');
}
function filterT(q){
  q=q.toLowerCase().trim();
  if(!q){
    document.querySelectorAll('#t-wrap .node-card').forEach(c=>{c.classList.remove('hi','dim');});
    document.querySelectorAll('#t-wrap .um-card').forEach(c=>c.style.opacity='1');
    return;
  }
  document.querySelectorAll('#t-wrap .node-card').forEach(c=>{
    c.classList.toggle('hi',!!q&&c.dataset.s&&c.dataset.s.includes(q));
    c.classList.toggle('dim',!!q&&(!c.dataset.s||!c.dataset.s.includes(q)));
  });
  document.querySelectorAll('#t-wrap .um-card').forEach(c=>{c.style.opacity=c.dataset.s&&c.dataset.s.includes(q)?'1':'0.2';});
  if(q)expandAllT();
}

renderNT();
renderTeaching();
</script>
